<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>诚心的心</title>
<link rel="stylesheet" href="assets/style.css">
<style>
  body{background:var(--ink);display:flex;align-items:center;justify-content:center;min-height:100dvh}
  .gate{width:100%;max-width:420px;padding:36px 26px;text-align:center;position:relative;z-index:10}
  .seal{font-family:var(--mono);font-size:11px;letter-spacing:.34em;color:var(--apron);opacity:.8;margin-bottom:26px}
  .heart{width:120px;height:120px;margin:0 auto 26px;position:relative}
  .heart svg{width:100%;height:100%;overflow:visible}
  .stitch{stroke:var(--apron);stroke-width:2.4;stroke-linecap:round;opacity:.9;
    stroke-dasharray:14;transition:stroke-dashoffset 1.1s ease,opacity .8s}
  .heartline{fill:none;stroke:var(--dry);stroke-width:3;opacity:.9}
  .title{font-family:var(--serif);font-weight:900;font-size:40px;letter-spacing:.14em;color:var(--parch);line-height:1}
  .sub{font-family:var(--mono);font-size:10px;letter-spacing:.3em;color:var(--ash);margin-top:12px}
  .dots{display:flex;gap:16px;justify-content:center;margin:34px 0 10px}
  .dots i{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--ash);transition:.25s}
  .dots i.on{background:var(--apron);border-color:var(--apron);box-shadow:0 0 12px rgba(160,191,82,.6)}
  .dots.err i{border-color:var(--ember);animation:shake .4s}
  @keyframes shake{25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .hint{font-family:var(--serif);font-size:13px;color:var(--paper-dim);opacity:.75;margin:8px 0 26px;min-height:20px}
  .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:270px;margin:0 auto;padding:0}
  .key{aspect-ratio:1.5;border:1px solid var(--line-strong);background:rgba(33,23,17,.4);
    border-radius:6px;color:var(--parch);font-family:var(--serif);font-size:22px;
    display:flex;align-items:center;justify-content:center;transition:.15s;user-select:none}
  .key:active{background:var(--pine);transform:scale(.95)}
  .key.fn{font-family:var(--mono);font-size:12px;letter-spacing:.1em;color:var(--ash)}
  .done{position:fixed;inset:0;background:var(--ink);display:flex;flex-direction:column;
    align-items:center;justify-content:center;z-index:80;opacity:0;pointer-events:none;transition:opacity .8s}
  .done.show{opacity:1;pointer-events:all}
  .done .msg{font-family:var(--serif);font-weight:700;font-size:26px;letter-spacing:.22em;color:var(--apron);
    text-shadow:0 0 24px rgba(160,191,82,.5)}
  .done .go{margin-top:26px;font-family:var(--mono);font-size:11px;letter-spacing:.24em;color:var(--paper-dim);opacity:.7}
</style>
</head>
<body>
<div class="grain"></div><div class="vig"></div>

<main class="gate">
  <div class="seal">档 案 封 缄 · 需 验 明 身 份</div>

  <div class="heart" id="heart">
    <svg viewBox="0 0 120 120">
      <path class="heartline" d="M60 104 C 18 74, 10 44, 30 30 C 46 19, 60 34, 60 44 C 60 34, 74 19, 90 30 C 110 44, 102 74, 60 104 Z"/>
      <line class="stitch" x1="60" y1="30" x2="60" y2="98"/>
      <line class="stitch" x1="34" y1="44" x2="86" y2="44"/>
      <line class="stitch" x1="30" y1="58" x2="90" y2="58"/>
      <line class="stitch" x1="36" y1="72" x2="84" y2="72"/>
      <line class="stitch" x1="46" y1="86" x2="74" y2="86"/>
    </svg>
  </div>

  <div class="title">诚心的心</div>
  <div class="sub">CHENG · XIN · DE · XIN</div>

  <div class="dots" id="dots"><i></i><i></i><i></i><i></i></div>
  <div class="hint" id="hint"></div>

  <div class="pad" id="pad">
    <div class="key">1</div><div class="key">2</div><div class="key">3</div>
    <div class="key">4</div><div class="key">5</div><div class="key">6</div>
    <div class="key">7</div><div class="key">8</div><div class="key">9</div>
    <div class="key fn" data-fn="clear">重填</div><div class="key">0</div><div class="key fn" data-fn="del">删除</div>
  </div>
</main>

<div class="done" id="done">
  <div class="msg" id="doneMsg"></div>
  <div class="go">正 在 进 入 …</div>
</div>

<script src="assets/app.js"></script>
<script>
  document.getElementById("hint").textContent = CONFIG.hint;
  const dots=document.getElementById("dots");
  const stitches=[...document.querySelectorAll(".stitch")];
  let buf="";
  function render(){
    [...dots.children].forEach((d,i)=>d.classList.toggle("on",i<buf.length));
  }
  function fail(){
    dots.classList.add("err");
    setTimeout(()=>{dots.classList.remove("err");buf="";render();},450);
  }
  function success(){
    // 拆线：十字绣依次退去
    stitches.forEach((s,i)=>setTimeout(()=>{s.style.strokeDashoffset="14";s.style.opacity="0";},i*140));
    try{sessionStorage.setItem("cx_open","1");}catch(e){}
    setTimeout(()=>{
      const d=document.getElementById("done");
      document.getElementById("doneMsg").textContent=CONFIG.successText;
      d.classList.add("show");
      setTimeout(()=>location.href="portal.html",1900);
    },900);
  }
  function push(n){
    if(buf.length>=4)return;
    buf+=n;render();
    if(buf.length===4){
      setTimeout(()=>{ buf===CONFIG.password ? success() : fail(); },160);
    }
  }
  document.getElementById("pad").addEventListener("click",e=>{
    const k=e.target.closest(".key"); if(!k)return;
    const fn=k.dataset.fn;
    if(fn==="clear"){buf="";render();}
    else if(fn==="del"){buf=buf.slice(0,-1);render();}
    else push(k.textContent.trim());
  });
  window.addEventListener("keydown",e=>{
    if(/^[0-9]$/.test(e.key))push(e.key);
    else if(e.key==="Backspace"){buf=buf.slice(0,-1);render();}
  });
</script>
</body>
</html>
